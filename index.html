<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="일한사전 - 일본어-한국어 사전 검색">
    <title>Nikuman Dict</title>
    <style>
        /* 일본어에 적용할 폰트 설정 (Noto Sans JP) */
        @font-face {
            font-family: "noto-sans-jp";
            src: url('./resources/_NotoSansJP-VariableFont_wght.ttf') format('truetype');
            font-style: normal;
            font-weight: 100 900;
            unicode-range: U+3000-303F, U+3040-309F, U+30A0-30FF, U+FF00-FFEF, U+4E00-9FAF, U+3400-4DBF;
        }

        /* 한국어 및 기본 텍스트에 Pretendard 적용 */
        @font-face {
            font-family: "pretendard";
            src: url('./resources/Pretendard-Regular.ttf') format('truetype');
            font-weight: 400;
        }

        @font-face {
            font-family: "pretendard";
            src: url('./resources/Pretendard-Medium.ttf') format('truetype');
            font-weight: 500;
        }

        @font-face {
            font-family: "pretendard";
            src: url('./resources/Pretendard-SemiBold.ttf') format('truetype');
            font-weight: 600;
        }

        @font-face {
            font-family: "pretendard";
            src: url('./resources/Pretendard-Bold.ttf') format('truetype');
            font-weight: 700;
        }

        @font-face {
            font-family: "pretendard";
            src: url('./resources/Pretendard-ExtraBold.ttf') format('truetype');
            font-weight: 800;
        }

        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
            --card-shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
            --border: #e2e5e9;
            --border-light: #eef0f3;
            --text-primary: #1a1d23;
            --text-secondary: #5a5f6b;
            --text-muted: #8b909c;
            --accent: #4361ee;
            --accent-light: #eef1ff;
            --accent-glow: rgba(67, 97, 238, 0.2);
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            font-family: 'pretendard', 'noto-sans-jp', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 60px 20px 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 440px;
        }

        /* ===== 사전 선택 탭 ===== */
        .dict-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            background: var(--card-bg);
            padding: 4px;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            border: 1.5px solid var(--border);
        }

        .dict-tab {
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
        }

        .dict-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .dict-tab:not(.active):hover {
            color: var(--accent);
            background: var(--accent-light);
        }

        /* ===== 검색바 ===== */
        .search-container {
            width: 100%;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            overflow: hidden;
            transition: border-color var(--transition), box-shadow var(--transition);
            position: relative;
            z-index: 10;
        }

        .search-container:focus-within {
            border-color: var(--accent);
            box-shadow: var(--card-shadow), 0 0 0 3px var(--accent-glow);
        }

        .search-icon {
            display: flex;
            align-items: center;
            padding-left: 16px;
            color: var(--text-muted);
            transition: color var(--transition);
        }

        .search-container:focus-within .search-icon {
            color: var(--accent);
        }

        .search-container input {
            flex: 1;
            padding: 14px 12px;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            outline: none;
            font-family: inherit;
            color: var(--text-primary);
            background: transparent;
        }

        .search-container input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .search-container button {
            padding: 10px 18px;
            margin: 5px 6px 5px 0;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background var(--transition), transform var(--transition);
        }

        .search-container button:hover {
            background: #3651d4;
            transform: translateY(-1px);
        }

        .search-container button:active {
            transform: translateY(0);
        }

        /* ===== 사전 팝업 카드 ===== */
        .dict-popup {
            width: 100%;
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: box-shadow var(--transition);
            overflow: hidden;
        }

        .dict-popup:hover {
            box-shadow: var(--card-shadow-hover);
        }

        /* ===== 헤더 ===== */
        .dict-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-light);
            background: linear-gradient(135deg, var(--accent-light) 0%, transparent 60%);
        }

        .dict-header-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--accent);
            letter-spacing: -0.01em;
        }

        .dict-header-count {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .dict-close {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            line-height: 1;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 8px;
            transition: background var(--transition), color var(--transition);
        }

        .dict-close:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        /* ===== 사전 콘텐츠 ===== */
        .dict-content {
            padding: 20px 24px;
            max-height: 60vh;
            overflow-y: auto;
            font-size: 0.92rem;
            line-height: 1.75;
            color: var(--text-primary);
        }

        .dict-content::-webkit-scrollbar {
            width: 5px;
        }

        .dict-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .dict-content::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .dict-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .dict-content h3 {
            margin: 0 0 6px 0;
            font-size: 1.7rem;
            font-weight: 800;
            line-height: 1.3;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .dict-content h3~h3 {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
        }

        .dict-content br {
            display: block;
            content: "";
            margin-bottom: 2px;
        }

        /* ===== 상태 메시지 ===== */
        .status-message {
            padding: 40px 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .status-message .status-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: block;
        }

        .status-message .status-text {
            font-weight: 500;
        }

        /* 로딩 스피너 */
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== 푸터 ===== */
        .dict-footer {
            display: flex;
            border-top: 1px solid var(--border-light);
        }

        .dict-footer button {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            color: var(--text-secondary);
            transition: background var(--transition), color var(--transition);
            position: relative;
        }

        .dict-footer button:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .dict-footer button:first-child {
            border-right: 1px solid var(--border-light);
        }

        .dict-footer button:active {
            background: #dde3fd;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- 사전 선택 탭 -->
        <div class="dict-tabs">
            <button class="dict-tab active" data-dict="jako">일한사전</button>
            <button class="dict-tab" data-dict="hanja">한자사전</button>
        </div>

        <!-- 검색창 -->
        <div class="search-container">
            <div class="search-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
            </div>
            <input id="search-input" type="text" placeholder="단어를 검색하세요...">
            <button id="search-btn">검색</button>
        </div>

        <div class="dict-popup">
            <div class="dict-header">
                <span class="dict-header-title">일한사전</span>
                <span class="dict-header-count"></span>
                <span class="dict-close" role="button" aria-label="닫기">×</span>
            </div>

            <div class="dict-content">
                <div class="status-message">
                    <span class="status-icon">📖</span>
                    <span class="status-text">검색어를 입력하세요</span>
                </div>
            </div>

            <div class="dict-footer">
                <button>Highlight</button>
                <button>More</button>
            </div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const dictContent = document.querySelector('.dict-content');
        const headerTitle = document.querySelector('.dict-header-title');
        const headerCount = document.querySelector('.dict-header-count');
        const tabs = document.querySelectorAll('.dict-tab');

        let currentDict = 'jako';

        const DICT_LABELS = {
            jako: '일한사전',
            hanja: '한자사전',
        };

        // 탭 전환
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentDict = tab.dataset.dict;
                headerTitle.textContent = DICT_LABELS[currentDict];
                headerCount.textContent = '';

                // 검색어가 있으면 자동 재검색
                if (searchInput.value.trim()) {
                    doSearch();
                }
            });
        });

        // 검색 실행
        function doSearch() {
            const query = searchInput.value.trim();
            if (!query) {
                showStatus('📖', '검색어를 입력하세요');
                return;
            }

            showLoading();

            fetch(`/api/search?q=${encodeURIComponent(query)}&dict=${currentDict}&limit=30`)
                .then(res => {
                    if (!res.ok) throw new Error('서버 오류');
                    return res.json();
                })
                .then(data => {
                    if (data.count === 0) {
                        showStatus('🔍', `"${query}"에 대한 결과가 없습니다`);
                        headerCount.textContent = '';
                        return;
                    }

                    headerCount.textContent = `${data.count}건`;

                    const html = data.results.map(r =>
                        `<h3>${escapeHtml(r.word)}</h3>${r.definition}`
                    ).join('<br><br>');

                    dictContent.innerHTML = html;
                    dictContent.scrollTop = 0;
                })
                .catch(err => {
                    console.error(err);
                    showStatus('⚠️', '검색 중 오류가 발생했습니다');
                });
        }

        function showLoading() {
            dictContent.innerHTML = `
                <div class="status-message">
                    <div class="spinner"></div>
                    <span class="status-text">검색 중...</span>
                </div>`;
            headerCount.textContent = '';
        }

        function showStatus(icon, text) {
            dictContent.innerHTML = `
                <div class="status-message">
                    <span class="status-icon">${icon}</span>
                    <span class="status-text">${text}</span>
                </div>`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 이벤트 바인딩
        searchBtn.addEventListener('click', doSearch);
        searchInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') doSearch();
        });

        // 닫기 버튼 — 결과 초기화
        document.querySelector('.dict-close').addEventListener('click', () => {
            searchInput.value = '';
            headerCount.textContent = '';
            showStatus('📖', '검색어를 입력하세요');
        });

        // 페이지 로드 시 입력창 포커스
        searchInput.focus();
    </script>
</body>

</html>
