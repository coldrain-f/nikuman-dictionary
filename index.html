<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Nikuman Dict — 일본어-한국어, 한자 사전 검색">
    <meta name="theme-color" content="#4361ee" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1a1d23" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Nikuman Dict</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="app-container">
        <!-- 앱 헤더 -->
        <header class="app-header">
            <span class="app-logo">🥟</span>
            <h1 class="app-title">肉まん <span>辞書</span></h1>
            <button class="theme-toggle" id="theme-toggle" type="button" aria-label="테마 전환">
                <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </header>

        <!-- 검색 영역 -->
        <div class="search-area">
            <!-- 사전 선택 탭 -->
            <div class="dict-tabs">
                <button class="dict-tab active" data-dict="jako" id="tab-jako">일한사전</button>
                <button class="dict-tab" data-dict="hanja" id="tab-hanja">한자사전</button>
            </div>

            <!-- 검색창 -->
            <div class="search-container">
                <div class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </div>
                <input id="search-input" type="text" placeholder="단어를 검색하세요..." autocomplete="off" autocapitalize="off"
                    autocorrect="off" spellcheck="false" enterkeyhint="search">
                <button class="search-clear" id="search-clear" type="button" aria-label="지우기">✕</button>
                <button class="search-submit" id="search-btn" type="button">검색</button>
            </div>
        </div>

        <!-- 결과 영역 -->
        <div class="results-area">
            <div class="dict-popup">
                <div class="dict-header">
                    <div class="dict-header-left">
                        <span class="dict-header-title">일한사전</span>
                        <span class="dict-header-count"></span>
                    </div>
                    <button class="dict-close" aria-label="닫기">×</button>
                </div>

                <div class="dict-content">
                    <div class="status-message">
                        <span class="status-icon">📖</span>
                        <span class="status-text">검색어를 입력하세요</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./javascript/app.js"></script>
</body>

</html>
